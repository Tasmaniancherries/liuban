# Scans manifest/lock changes on pull requests for known vulnerabilities.
# Requires Dependency graph (see repo Settings → Code security).
name: Dependency review

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
    paths:
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # pull_request 會自動帶入 base/head；workflow_dispatch 沒有 PR 內容，必須手動指定 ref，否則會失敗：
      # "Both a base ref and head ref must be provided..."
      - name: Dependency review
        uses: actions/dependency-review-action@v5.0.0
        with:
          base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.event.repository.default_branch }}
          head-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
