# Scans manifest/lock changes on pull requests for known vulnerabilities.
# Requires Dependency graph (see repo Settings → Code security).
name: Dependency review

on:
  workflow_dispatch: {}
  pull_request:
    branches: ["main"]
    paths:
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency review
        uses: actions/dependency-review-action@v4
