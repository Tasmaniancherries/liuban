name: Meta lint

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "tool/*.sh"
      - "Makefile"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "tool/*.sh"
      - "Makefile"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflow files
        # Pin full semver: @v1 is not a published major tag on this action.
        uses: rhysd/actionlint@v1.7.12

      - name: Lint shell scripts
        run: shellcheck tool/*.sh
