name: Flutter CI

env:
  # Single place to bump when upgrading Flutter for CI (keep README/CONTRIBUTING in sync).
  FLUTTER_VERSION: "3.41.6"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write # upload-artifact (lcov)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 21
          if-no-files-found: error

  compile:
    name: Web & Android smoke builds
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write # upload-artifact (debug APK)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build web (smoke)
        run: flutter build web --release

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            tools platform-tools
            platforms;android-36 build-tools;35.0.0
            ndk;28.2.13676358
            cmake;3.22.1

      - name: Precache Flutter Android binaries
        run: flutter precache --android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Build Android APK (smoke)
        run: flutter build apk --debug

      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: build/app/outputs/**/*.apk
          retention-days: 7
          if-no-files-found: error

