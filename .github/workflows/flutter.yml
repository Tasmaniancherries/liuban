name: Flutter CI

env:
  # Single place to bump when upgrading Flutter for CI (keep README/CONTRIBUTING in sync).
  FLUTTER_VERSION: "3.41.6"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
      - "LICENSE"

jobs:
  quality:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write # upload-artifact (lcov)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Quality checks
        run: make ci-quality

      - name: Upload coverage (lcov)
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 21
          if-no-files-found: error

  compile:
    name: Web & Android smoke builds
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: write # upload-artifact (debug APK)

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            tools platform-tools
            platforms;android-36 build-tools;35.0.0
            ndk;28.2.13676358
            cmake;3.22.1

      - name: Precache Flutter Android binaries
        run: flutter precache --android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-root-directory: android

      - name: Smoke builds (web + Android)
        run: make ci-smoke

      - name: Upload debug APK (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: build/app/outputs/**/*.apk
          retention-days: 7
          if-no-files-found: error

